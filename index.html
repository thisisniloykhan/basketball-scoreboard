<html>
  <head>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="main">
      <div class="container">
        <div>
          <h3 class="titlesection-design">HOME</h3>
          <h1 class="score-design" id="home-score">0</h1>
          <div class="btnsection-design">
            <button onclick="increaseHomeScore(1)">+1</button>
            <button onclick="increaseHomeScore(2)">+2</button>
            <button onclick="increaseHomeScore(3)">+3</button>
          </div>
        </div>
        <div>
          <h3 class="titlesection-design">GUEST</h3>
          <h1 class="score-design" id="guest-score">0</h1>
          <div class="btnsection-design">
            <button onclick="increaseGuestScore(1)">+1</button>
            <button onclick="increaseGuestScore(2)">+2</button>
            <button onclick="increaseGuestScore(3)">+3</button>
          </div>
        </div>
      </div>

      <div>
        <button id="reset-btn" onclick="resetPoints()">New Game</button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
